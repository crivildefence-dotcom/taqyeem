// ── طباعة بطاقات الباركود ──────────────────────────
function printEvalQR(){
  var reqs = db.requests.filter(function(r){
    return r.status!=='ملغاة' && r.status!=='مؤجلة' && r.trainer;
  });
  if(!reqs.length){ toast('لا توجد طلبات لطباعة بطاقاتها','err'); return; }

  var baseUrl = window.location.href.replace(/[?#].*$/,'');
  var cards = reqs.map(function(r){
    var evalUrl = baseUrl + '?eval=1&rid='+r.id+'&trainer='+encodeURIComponent(r.trainer)+'&school='+encodeURIComponent(r.schoolName)+'&date='+encodeURIComponent(r.execDate||r.submitDate||'');
    // Generate QR using QR code API
    var qrImg = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(evalUrl);
    return '<div style="width:240px;border:2px solid #1B2A4A;border-radius:10px;padding:16px;text-align:center;page-break-inside:avoid;margin:8px">'
      +'<div style="font-size:11px;font-weight:700;color:#1B2A4A;margin-bottom:4px">نظام إدارة طلبات المدارس</div>'
      +'<div style="font-size:10px;color:#C9A84C;font-weight:700;margin-bottom:8px">قسم التثقيف الوقائي</div>'
      +'<div style="border:1px solid #eee;border-radius:6px;padding:6px;margin-bottom:8px">'
      +'<img src="'+qrImg+'" width="150" height="150" alt="QR">'
      +'</div>'
      +'<div style="font-size:12px;font-weight:700;color:#1B2A4A;margin-bottom:4px">'+r.schoolName+'</div>'
      +'<div style="font-size:11px;color:#555;margin-bottom:2px">المدرب: '+r.trainer+'</div>'
      +'<div style="font-size:11px;color:#555;margin-bottom:6px">التاريخ: '+(r.execDate||'—')+'</div>'
      +'<div style="font-size:10px;color:#888;border-top:1px solid #eee;padding-top:6px">امسح الباركود لتقييم المدرب</div>'
      +'</div>';
  }).join('');

  var w = window.open('','_blank');
  w.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>بطاقات التقييم</title>'
    +'<style>body{font-family:Calibri,Arial,sans-serif;direction:rtl;background:#fff;padding:20px}'
    +'.cards{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}'
    +'@media print{body{padding:10px}.no-print{display:none}}</style>'
    +'</head><body>'
    +'<div style="text-align:center;margin-bottom:20px;font-size:14px;font-weight:700;color:#1B2A4A">بطاقات تقييم المدربين</div>'
    +'<div class="cards">'+cards+'</div>'
    +'</body></html>');
  w.document.close();
  w.focus();
  setTimeout(function(){w.print();},1500);
}

function selectStar(el){
  var q = el.dataset.q;
  var v = parseInt(el.dataset.v);
  document.querySelectorAll('[data-q="'+q+'"]').forEach(function(s){
    s.style.color = parseInt(s.dataset.v) <= v ? '#C9A84C' : '#ddd';
  });
  document.querySelector('input[name="'+q+'"][value="'+v+'"]').checked = true;
}

function submitEvalFromBtn(btn){
  var rid     = btn.dataset.rid;
  var trainer = btn.dataset.trainer;
  var school  = btn.dataset.school;
  var date    = btn.dataset.date;
  submitEval(rid, trainer, school, date);
}
function submitEval(rid, trainer, school, date){
  var answers = {};
  var allAnswered = true;
  EVAL_QUESTIONS.forEach(function(q){
    var inp = document.querySelector('input[name="'+q.id+'"]:checked');
    if(inp){ answers[q.id] = parseInt(inp.value); }
    else { allAnswered = false; }
  });

  if(!allAnswered){
    alert('يرجى الإجابة على جميع الأسئلة قبل الإرسال');
    return;
  }

  var notes = document.getElementById('eval-notes')?.value || '';
  var eval_ = {
    id: db.evalNextId++,
    reqId: parseInt(rid)||0,
    trainerName: trainer,
    schoolName: school,
    date: date || new Date().toISOString().split('T')[0],
    answers: answers,
    notes: notes,
    submittedAt: new Date().toISOString()
  };
  db.evaluations.push(eval_);
  save();

  var avg = (Object.values(answers).reduce(function(s,v){return s+v;},0)/Object.values(answers).length).toFixed(1);
  document.body.innerHTML = '<div style="max-width:400px;margin:60px auto;padding:30px;text-align:center;font-family:Arial;direction:rtl">'
    +'<div style="font-size:60px;margin-bottom:16px">✅</div>'
    +'<div style="font-size:18px;font-weight:700;color:#1B2A4A;margin-bottom:8px">شكراً على تقييمك!</div>'
    +'<div style="font-size:14px;color:#555;margin-bottom:16px">تم إرسال تقييمك بنجاح</div>'
    +'<div style="background:#EEF1F7;border-radius:10px;padding:16px;font-size:13px;color:#1B2A4A">'
    +'<b>متوسط تقييمك:</b> <span style="color:#C9A84C;font-size:20px;font-weight:900">'+avg+'</span> / 5'
    +'</div></div>';
}

// EVACUATION REPORT
// ═══════════════════════════════════════════════════════
function openEvacModal(type){
  var now = new Date();
  var curYear = now.getFullYear();
  var curMonth = now.getMonth();
  var curQ = Math.floor(curMonth/3);

  var years = [];
  db.requests.forEach(function(r){
    var y = r.submitDate ? new Date(r.submitDate).getFullYear() : null;
    if(y && years.indexOf(y)===-1) years.push(y);
  });
  years.sort(function(a,b){return b-a;});
  if(years.indexOf(curYear)===-1) years.unshift(curYear);

  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var QUARTERS=['الربع الأول (يناير–مارس)','الربع الثاني (أبريل–يونيو)','الربع الثالث (يوليو–سبتمبر)','الربع الرابع (أكتوبر–ديسمبر)'];
  var typeNames={month:'شهري',quarter:'ربع سنوي',year:'سنوي'};

  var yearOpts = years.map(function(y){
    return '<option value="'+y+'"'+(y===curYear?' selected':'')+'>'+y+'</option>';
  }).join('');

  var selector = '';
  if(type==='month'){
    var monthOpts = MONTHS.map(function(m,i){
      return '<option value="'+i+'"'+(i===curMonth?' selected':'')+'>'+m+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الشهر</label><select class="fsel2" id="ev-month">'+monthOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="ev-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else if(type==='quarter'){
    var qOpts = QUARTERS.map(function(q,i){
      return '<option value="'+i+'"'+(i===curQ?' selected':'')+'>'+q+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الربع السنوي</label><select class="fsel2" id="ev-quarter">'+qOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="ev-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else {
    selector = '<div><label class="flbl">السنة</label>'
      +'<select class="fsel2" id="ev-year" style="max-width:200px">'+yearOpts+'</select></div>';
  }

  showModal('<div class="mhdr" style="background:linear-gradient(135deg,#C45E0A,#E07010)">'
    +'<span class="mhdr-title">🚨 تقرير الإخلاء – '+typeNames[type]+'</span>'
    +'<button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="mbody"><p style="font-size:12px;color:var(--g3);margin-bottom:16px">اختر الفترة الزمنية:</p>'
    +selector+'</div>'
    +'<div class="mfoot">'
    +'<button class="btn btn-s" onclick="closeModal()">إلغاء</button>'
    +'<input type="hidden" id="ev-type" value="'+type+'">'
    +'<button class="btn btn-p" style="background:#C45E0A" onclick="confirmEvacReport()">🖨 طباعة</button>'
    +'</div>');
}

function confirmEvacReport(){
  var type = document.getElementById('ev-type')?.value || 'month';
  var yr   = parseInt(document.getElementById('ev-year')?.value   || new Date().getFullYear());
  var mo   = parseInt(document.getElementById('ev-month')?.value  ?? new Date().getMonth());
  var q    = parseInt(document.getElementById('ev-quarter')?.value ?? Math.floor(new Date().getMonth()/3));
  closeModal();
  printEvacReport(type, yr, mo, q);
}

function printEvacReport(type, yr, mo, q){
  var now = new Date();
  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var QUARTERS=['الربع الأول','الربع الثاني','الربع الثالث','الربع الرابع'];

  // Filter evacuation requests only
  var EVAC_TYPES = ['دورة الاخلاء','تطبيق الاخلاء','تطبيق الايواء','دورة الامن والسلامة'];

  var allEvac = db.requests.filter(function(r){
    if(!r.reqType) return false;
    return EVAC_TYPES.some(function(t){ return r.reqType.indexOf(t) > -1; });
  });

  var filtered = allEvac, title = '';

  if(type==='month'){
    filtered = allEvac.filter(function(r){
      if(!r.submitDate) return false;
      var d = new Date(r.submitDate);
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    title = 'تقرير الإخلاء الشهري – '+MONTHS[mo]+' '+yr;
  } else if(type==='quarter'){
    filtered = allEvac.filter(function(r){
      if(!r.submitDate) return false;
      var d = new Date(r.submitDate);
      return d.getFullYear()===yr && Math.floor(d.getMonth()/3)===q;
    });
    title = 'تقرير الإخلاء الربع سنوي – '+QUARTERS[q]+' '+yr;
  } else {
    filtered = allEvac.filter(function(r){
      return r.submitDate && new Date(r.submitDate).getFullYear()===yr;
    });
    title = 'تقرير الإخلاء السنوي – '+yr;
  }

  if(filtered.length===0){
    alert('لا توجد بيانات إخلاء للفترة المحددة: '+title);
    return;
  }

  var done    = filtered.filter(function(r){return r.status==='مكتملة';}).length;
  var delayed = filtered.filter(function(r){return r.status==='مؤجلة';}).length;
  var prog    = filtered.filter(function(r){return r.status==='قيد التنفيذ';}).length;
  var wait    = filtered.filter(function(r){return r.status==='انتظار';}).length;
  var pct     = filtered.length ? Math.round(done/filtered.length*100) : 0;

  // Build rows
  var rows = filtered.map(function(r,i){
    var statusColor = r.status==='مكتملة'?'#1E6B3C':r.status==='مؤجلة'?'#C45E0A':r.status==='ملغاة'?'#C0392B':'#1A4A7A';
    return '<tr>'
      +'<td style="font-weight:700;color:#1B2A4A">'+(i+1)+'</td>'
      +'<td style="text-align:right;font-weight:600">'+r.schoolName+'</td>'
      +'<td>'+r.reqType+'</td>'
      +'<td>'+(r.execDate||'—')+'</td>'
      +'<td>'+(r.trainer||'—')+'</td>'
      +'<td style="font-weight:700;color:'+statusColor+'">'+r.status+'</td>'
      +'<td style="font-size:11px;text-align:right;color:#666">'+(r.notes||'—')+'</td>'
      +'</tr>';
  }).join('');

  var ps = '<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Calibri,Arial,sans-serif;padding:24px;direction:rtl;color:#1A1816;background:#fff}'
    +'h2{color:#1B2A4A;font-size:15px;margin-bottom:4px}'
    +'.meta{font-size:11px;color:#555;margin-bottom:14px;border-bottom:3px solid #C45E0A;padding-bottom:8px}'
    +'.kbox{display:inline-block;background:#FFF5EE;border-right:4px solid #C45E0A;padding:10px 16px;margin:0 4px 14px;border-radius:6px;text-align:center;min-width:88px}'
    +'.knum{font-size:22px;font-weight:900;color:#C45E0A}.klbl{font-size:10px;color:#888}'
    +'.sec{font-size:13px;font-weight:700;color:#1B2A4A;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid #C45E0A}'
    +'table{width:100%;border-collapse:collapse;font-size:12px}'

// IMPORT EVAL FROM EMAIL
// ═══════════════════════════════════════════════════════
function showImportEvalModal(){
  showModal('<div class="mhdr" style="background:linear-gradient(135deg,#1E6B3C,#2E8B57)">'
    +'<span class="mhdr-title">📥 استيراد تقييم من إيميل</span>'
    +'<button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="mbody">'
    +'<p style="font-size:12px;color:var(--g3);margin-bottom:12px">افتحي الإيميل الوارد من نموذج التقييم، ثم انسخي محتوى الرسالة كاملاً والصقيه هنا:</p>'
    +'<textarea id="import-text" style="width:100%;min-height:160px;border:1.5px solid #E0E6F0;border-radius:8px;padding:10px;font-family:Calibri,Arial;font-size:12px;direction:ltr" placeholder="الصق محتوى الإيميل هنا..."></textarea>'
    +'</div>'
    +'<div class="mfoot">'
    +'<button class="btn btn-s" onclick="closeModal()">إلغاء</button>'
    +'<button class="btn btn-p" style="background:#1E6B3C" onclick="importEvalFromEmail()">📥 استيراد</button>'
    +'</div>');
}

function importEvalFromEmail(){
  var text = document.getElementById('import-text')?.value || '';
  var start = text.indexOf('===TAQYEEM_DATA_START===');
  var end   = text.indexOf('===TAQYEEM_DATA_END===');
  if(start===-1 || end===-1){
    toast('لم يتم التعرف على البيانات — تأكدي من نسخ الإيميل كاملاً','err');
    return;
  }
  var data = text.substring(start+24, end).trim();
  var lines = data.split('\n');
  var obj = {};
  lines.forEach(function(l){
    var idx = l.indexOf(':');
    if(idx>-1){ obj[l.substring(0,idx).trim()] = l.substring(idx+1).trim(); }
  });
  if(!obj.school || !obj.trainer){
    toast('البيانات غير مكتملة','err');
    return;
  }
  var answers = {};
  for(var k in obj){
    if(k.startsWith('q')){ answers[k.substring(1)] = parseInt(obj[k]); }
  }
  db.evaluations.push({
    id: db.evalNextId++,
    trainerName: obj.trainer,
    schoolName:  obj.school,
    reqType:     obj.type||'—',
    date:        obj.date||new Date().toISOString().split('T')[0],
    answers:     answers,
    avg:         parseFloat(obj.avg)||0,
    grade:       obj.grade||'—',
    submittedAt: new Date().toISOString()
  });
  save();
  closeModal();
  toast('تم استيراد التقييم بنجاح ✅','ok');
  go('evals');
}

// ═══════════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════════
function showModal(html, wrapId='modal-wrap'){
  const w=document.getElementById(wrapId);
  w.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal('${wrapId}')"><div class="modal modal-sm">${html}</div></div>`;
}
function closeModal(wrapId='modal-wrap'){
  const w=document.getElementById(wrapId);
  if(w) w.innerHTML='';
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=type+' show';
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
