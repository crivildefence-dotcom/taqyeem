<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#8B0000;--red2:#A52020;--red3:#C0392B;
  --pale:#FDF2F2;--row1:#FFFFFF;--row2:#FEF9F9;
  --gold:#C9A84C;--goldL:#FEF9E7;
  --blue:#1A4A7A;--blueL:#EAF2FB;
  --green:#1E6B3C;--greenL:#E8F5EE;
  --orange:#C45E0A;--oraL:#FEF0E0;
  --g1:#F5F4F2;--g2:#E0DDD8;--g3:#8A8680;
  --white:#FFFFFF;--black:#1A1816;
  --sh:0 2px 8px rgba(0,0,0,.10);
  --sh2:0 4px 20px rgba(0,0,0,.14);
  --r:8px;--r2:12px;
}
body{font-family:'Cairo',sans-serif;background:#F0EEEA;color:var(--black);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
/* ── LOGIN ─────────────────────────────────────────────── */
#screen-login{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#1A0808 0%,#2D1010 50%,#140505 100%);
  position:relative;overflow:hidden;
}
#screen-login::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 50px,rgba(255,255,255,.018) 50px,rgba(255,255,255,.018) 51px),
    repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(255,255,255,.018) 50px,rgba(255,255,255,.018) 51px);
}
.login-card{
  background:#fff;border-radius:var(--r2);box-shadow:0 24px 80px rgba(0,0,0,.5);
  width:420px;max-width:94vw;overflow:hidden;
  animation:popIn .45s cubic-bezier(.34,1.5,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:translateY(40px) scale(.94)}to{opacity:1;transform:none}}
.login-top{
  background:linear-gradient(135deg,var(--red),var(--red3));
  padding:32px 28px 26px;text-align:center;position:relative;
}
.login-top::after{
  content:'';position:absolute;bottom:-18px;left:-5%;right:-5%;
  height:36px;background:#fff;border-radius:50%;
}
.login-icon{
  width:68px;height:68px;border-radius:50%;
  background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:30px;
}
.login-title{color:#fff;font-size:17px;font-weight:700;line-height:1.45}
.login-sub{color:rgba(255,255,255,.72);font-size:11px;margin-top:3px}
.login-body{padding:42px 28px 28px}
.err-box{
  background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r);
  padding:9px 13px;font-size:12.5px;color:#b91c1c;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--g3);margin-bottom:5px}
.inp-wrap{position:relative}
.inp-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#ccc;pointer-events:none}
.inp{
  width:100%;padding:10px 36px 10px 36px;border:1.5px solid var(--g2);border-radius:var(--r);
  font-family:'Cairo',sans-serif;font-size:13.5px;color:var(--black);
  background:var(--g1);outline:none;transition:.18s;direction:rtl;
}
.inp:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(139,0,0,.09)}
.pw-toggle{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;
  transition:color .18s;padding:2px;
}
.pw-toggle:hover{color:var(--red)}
.btn-login{
  width:100%;padding:12px;background:linear-gradient(135deg,var(--red),var(--red3));
  color:#fff;border:none;border-radius:var(--r);
  font-family:'Cairo',sans-serif;font-size:14.5px;font-weight:700;
  cursor:pointer;transition:.18s;box-shadow:0 4px 16px rgba(139,0,0,.28);letter-spacing:.2px;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(139,0,0,.36)}
.login-hint{text-align:center;font-size:11px;color:#bbb;margin-top:16px;padding-top:14px;border-top:1px solid var(--g2)}
/* ── APP SHELL ─────────────────────────────────────────── */
#screen-app{display:flex;min-height:100vh}
.sidebar{
  width:232px;min-width:232px;
  background:linear-gradient(180deg,var(--red) 0%,#560000 100%);
  display:flex;flex-direction:column;
  position:fixed;top:0;right:0;bottom:0;z-index:100;
  box-shadow:-3px 0 16px rgba(0,0,0,.16);
}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sb-logo-icon{font-size:34px;display:block;margin-bottom:7px}
.sb-logo-name{color:#fff;font-size:12.5px;font-weight:700;line-height:1.4}
.sb-logo-sub{color:rgba(255,255,255,.55);font-size:10px;margin-top:2px}
.sb-user{padding:12px 15px;background:rgba(0,0,0,.22);display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.sb-uinfo{flex:1;min-width:0}
.sb-uname{color:#fff;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.role-pill{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:700}
.role-admin{background:var(--gold);color:#3a2800}
.role-user{background:rgba(255,255,255,.18);color:#fff}
.sb-nav{flex:1;padding:10px 9px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:1px;padding:8px 9px 3px}
.nav-btn{
  display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:var(--r);
  cursor:pointer;transition:.15s;color:rgba(255,255,255,.72);font-size:12.5px;font-weight:500;
  margin-bottom:1px;border:none;background:none;width:100%;text-align:right;
  font-family:'Cairo',sans-serif;
}
.nav-btn:hover{background:rgba(255,255,255,.11);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.17);color:#fff;font-weight:700;box-shadow:inset 3px 0 0 var(--gold)}
.nav-icon{font-size:15px;flex-shrink:0}
.sb-foot{padding:10px 9px;border-top:1px solid rgba(255,255,255,.1)}
.btn-logout{
  display:flex;align-items:center;gap:9px;width:100%;padding:9px 13px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);
  color:rgba(255,255,255,.68);font-family:'Cairo',sans-serif;font-size:12.5px;cursor:pointer;transition:.15s;
}
.btn-logout:hover{background:rgba(220,50,50,.2);color:#fff;border-color:rgba(220,80,80,.3)}
.main{margin-right:232px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  background:#fff;border-bottom:1px solid var(--g2);padding:0 26px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;box-shadow:var(--sh);
}
.topbar-title{font-size:15px;font-weight:700;color:var(--red)}
.topbar-date{font-size:11.5px;color:var(--g3)}
.page{flex:1;padding:22px 26px}
/* ── COMMON COMPONENTS ────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:var(--r2);padding:16px 14px;box-shadow:var(--sh);border-top:3px solid var(--red);transition:.18s;cursor:default}
.kpi:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.kpi.blue{border-color:var(--blue)}.kpi.green{border-color:var(--green)}
.kpi.orange{border-color:var(--orange)}.kpi.gold{border-color:var(--gold)}.kpi.red2{border-color:var(--red3)}
.kpi-lbl{font-size:10.5px;color:var(--g3);font-weight:600;margin-bottom:5px}
.kpi-val{font-size:30px;font-weight:900;line-height:1;color:var(--black)}
.kpi-val.blue{color:var(--blue)}.kpi-val.green{color:var(--green)}
.kpi-val.orange{color:var(--orange)}.kpi-val.gold{color:var(--gold)}.kpi-val.red2{color:var(--red3)}
.kpi-sub{font-size:10px;color:#ccc;margin-top:3px}
.sec-title{font-size:13.5px;font-weight:700;color:var(--red);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--g2)}
.card{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden}
.card-toolbar{padding:12px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.srch{
  flex:1;min-width:180px;padding:7px 12px;border:1.5px solid var(--g2);border-radius:var(--r);
  font-family:'Cairo',sans-serif;font-size:12.5px;outline:none;transition:.15s;direction:rtl;
}
.srch:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(139,0,0,.07)}
.fsel{
  padding:7px 11px;border:1.5px solid var(--g2);border-radius:var(--r);
  font-family:'Cairo',sans-serif;font-size:12.5px;outline:none;background:#fff;cursor:pointer;direction:rtl;
}
.fsel:focus{border-color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-family:'Cairo',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;border:none;white-space:nowrap}
.btn-p{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(139,0,0,.25)}
.btn-p:hover{background:var(--red2);transform:translateY(-1px)}
.btn-s{background:var(--g1);color:var(--black);border:1px solid var(--g2)}
.btn-s:hover{background:var(--g2)}
.btn-d{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.btn-d:hover{background:#fee2e2}
.btn-ok{background:var(--greenL);color:var(--green);border:1px solid #bbf7d0}
.btn-sm{padding:4px 9px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--red);color:#fff;padding:9px 11px;text-align:center;font-weight:700;font-size:11.5px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--g2);transition:background .12s}
tbody tr:hover{background:var(--pale)}
tbody tr:nth-child(even){background:var(--g1)}
tbody tr:nth-child(even):hover{background:var(--pale)}
td{padding:8px 11px;text-align:center;vertical-align:middle}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap}
.b-wait{background:var(--goldL);color:#7a5200}
.b-prog{background:var(--blueL);color:var(--blue)}
.b-done{background:var(--greenL);color:var(--green)}
.b-cancel{background:var(--pale);color:var(--red3)}
.b-delay{background:var(--g1);color:var(--g3)}
.t-empty{text-align:center;padding:36px;color:var(--g3);font-size:13px}
.chart-wrap{max-width:580px;margin:18px auto 0;background:#fff;border-radius:var(--r2);padding:18px;box-shadow:var(--sh);border:1px solid var(--g2)}
.chart-title{font-size:13px;font-weight:700;color:#1B2A4A;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #1B2A4A;text-align:center}
.pgn{padding:11px 16px;border-top:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--g3)}
.pg-btns{display:flex;gap:3px}
.pg-btn{width:26px;height:26px;border:1px solid var(--g2);border-radius:4px;background:#fff;cursor:pointer;font-size:11.5px;font-family:'Cairo',sans-serif;transition:.15s}
.pg-btn:hover,.pg-btn.act{background:var(--red);color:#fff;border-color:var(--red)}
/* ── MODAL ─────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--r2);box-shadow:0 20px 60px rgba(0,0,0,.22);width:660px;max-width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .22s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:none;opacity:1}}
.modal-sm{width:420px}
.mhdr{background:linear-gradient(135deg,var(--red),var(--red3));padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.mhdr-title{color:#fff;font-size:14px;font-weight:700}
.mclose{background:rgba(255,255,255,.18);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.mclose:hover{background:rgba(255,255,255,.32)}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-top:1px solid var(--g2);display:flex;gap:9px;justify-content:flex-end}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.full{grid-column:1/-1}
.flbl{font-size:11.5px;font-weight:700;color:var(--g3);margin-bottom:4px;display:block}
.finp,.fsel2,.ftxt{width:100%;padding:9px 11px;border:1.5px solid var(--g2);border-radius:var(--r);font-family:'Cairo',sans-serif;font-size:13px;color:var(--black);background:var(--g1);outline:none;transition:.15s;direction:rtl}
.finp:focus,.fsel2:focus,.ftxt:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(139,0,0,.07)}
.ftxt{resize:vertical;min-height:65px}
/* ── STATS ─────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.sc{background:#fff;border-radius:var(--r2);padding:18px;box-shadow:var(--sh)}
.sc-title{font-size:12.5px;font-weight:700;color:var(--red);margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--g2)}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:11.5px}
.bar-lbl{width:128px;text-align:right;color:var(--black);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:7px;background:var(--g2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:var(--red);border-radius:99px;transition:width .6s ease}
.bar-fill.blue{background:var(--blue)}.bar-fill.green{background:var(--green)}
.bar-fill.orange{background:var(--orange)}.bar-fill.gold{background:var(--gold)}
.bar-count{width:26px;text-align:left;font-weight:700;font-size:12px;color:var(--black)}
/* ── TOAST ─────────────────────────────────────────────── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--black);color:#fff;padding:11px 22px;border-radius:var(--r2);font-size:12.5px;font-weight:500;z-index:9999;transition:transform .28s cubic-bezier(.34,1.4,.64,1);white-space:nowrap;box-shadow:var(--sh2)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--green)}
#toast.err{background:#b91c1c}
/* ── PRINT ─────────────────────────────────────────────── */
@media print{
  .sidebar,.topbar,.card-toolbar,.pgn,.btn,.no-print{display:none!important}
  .main{margin-right:0}
  body{background:#fff}
  table{font-size:10px}
  thead th{background:var(--red)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

var _reminderShown = false;
function checkTomorrow(){
  if(_reminderShown) return;
  _reminderShown = true;
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tStr = tomorrow.toISOString().split('T')[0];
  const tDisplay = tomorrow.toLocaleDateString('ar-QA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const due = db.requests.filter(function(r){
    return r.execDate === tStr && r.status !== 'مكتملة' && r.status !== 'ملغاة' && r.status !== 'مؤجلة';
  });

  if(due.length === 0) return;

  // Build reminder message
  var msg = '🔔 تذكير بمواعيد غد – ' + tDisplay + '\n\n';
  due.forEach(function(r, i){
    msg += (i+1) + '. ' + r.schoolName + '\n';
    msg += '   📋 النوع: ' + (r.reqType||'—') + '\n';
    msg += '   🕐 الوقت: ' + (r.execTime||'—') + '\n';
    msg += '   👷 المدرب: ' + (r.trainer||'—') + '\n\n';
  });
  msg += 'عدد المواعيد: ' + due.length;

  // Show custom modal instead of alert
  showReminderModal(msg, due);
}

      + '<td style="font-weight:700;color:#1B2A4A">' + (i+1) + '</td>'
      + '<td style="text-align:right;font-weight:600">' + r.schoolName + '</td>'

      + '<td>' + (r.execTime||'—') + '</td>'
      + '<td>' + (r.trainer||'—') + '</td>'

  }).join('');

  // Build email buttons for each trainer

  var trainersDone = {};

  w.innerHTML = '<div class="overlay">'

    + '<button class="mclose" onclick="closeModal()">✕</button>'

    + '<p style="font-size:12px;color:#C45E0A;font-weight:700;margin-bottom:12px">⚠️ يوجد ' + due.length + ' موعد غداً يستحق التذكير:</p>'
    + '<table style="width:100%;border-collapse:collapse;font-size:12px">'
    + '<thead><tr>'

    + '<button class="btn btn-s" onclick="closeModal()">إغلاق</button>'
    + getReminderEmailBtns(due)
    + '</div>'
    + '</div>'
    + '</div>';
}

function getReminderEmailBtns(due){
  _reminderUrls = {};
  var allEmails = [];
  due.forEach(function(r){
    if(r.trainer){
      r.trainer.split('/').forEach(function(t){
        t = t.trim();
        var tr = db.trainers.find(function(x){ return (typeof x==='string'?x:x.name)===t; });
        var email = (tr && typeof tr==='object') ? (tr.email||'') : '';
        if(email && allEmails.indexOf(email)===-1) allEmails.push(email);
      });
    }
  });
  var bodyLines = ['السلام عليكم،','','تذكير بمواعيد تثقيف غداً:',''];
  due.forEach(function(r){
    bodyLines.push('• المدرسة: '+r.schoolName);
    bodyLines.push('  نوع الطلب: '+(r.reqType||'—'));
    bodyLines.push('  الوقت: '+(r.execTime||'—'));
    bodyLines.push('  المدرب: '+(r.trainer||'—'));
    bodyLines.push('');
  });
  bodyLines.push('مع التحية،\nقسم التثقيف الوقائي\nالإدارة العامة للدفاع المدني');
  var subj = encodeURIComponent('تذكير بموعد تثقيف غداً');
  var bod  = encodeURIComponent(bodyLines.join('\n'));
  var url  = 'https://outlook.office.com/mail/deeplink/compose'
    +'?to='+encodeURIComponent(allEmails.join(';'))+'&subject='+subj+'&body='+bod;
  _reminderUrls['rem_all'] = url;
  return '<button class="btn btn-p" style="background:#1A4A7A" id="rem_all" onclick="openReminderUrl(this.id)">📧 إرسال تنبيه</button>';
}

}

function bindReqs(){applyFlt();}
function applyFlt(){
  flt.q=(document.getElementById('q')?.value||'').toLowerCase();
  flt.type=document.getElementById('ft')?.value||'';
  flt.status=document.getElementById('fs')?.value||'';
  const filtered=db.requests.filter(r=>{
    const mq=!flt.q||r.schoolName.toLowerCase().includes(flt.q)||r.schoolNum.toLowerCase().includes(flt.q)||(r.trainer||'').toLowerCase().includes(flt.q);
    const mt=!flt.type||r.reqType===flt.type;
    const ms=!flt.status||r.status===flt.status;
    return mq&&mt&&ms;
  });
  const tot=filtered.length, pages=Math.max(1,Math.ceil(tot/PS));
  flt.page=Math.min(flt.page,pages);
  const slice=filtered.slice((flt.page-1)*PS,flt.page*PS);
  const isAdmin=CU.role==='ADMIN';
  document.getElementById('rtb').innerHTML=`
    <table>
      <thead><tr><th>#</th><th>رقم الطلب</th><th>تاريخ التقديم</th><th>اسم المدرسة</th><th>نوع الطلب</th><th>تاريخ التنفيذ</th><th>المدرب</th><th>الحالة</th><th class="no-print">أدخل بواسطة</th><th class="no-print">إجراءات</th></tr></thead>
      <tbody>${slice.length?slice.map((r,i)=>`<tr>
        <td style="font-weight:700;color:var(--red)">${(flt.page-1)*PS+i+1}</td>
        <td style="font-weight:600">${r.schoolNum}</td>
        <td>${r.submitDate||'—'}</td>
        <td style="text-align:right;font-size:11.5px">${r.schoolName}</td>
        <td>${r.reqType}</td><td>${r.execDate||'—'}</td><td>${r.trainer||'—'}</td>
        <td>${badge(r.status)}</td>
        <td style="font-size:11px;color:var(--g3)" class="no-print">${r.addedBy}</td>
        <td class="no-print"><div style="display:flex;gap:5px;justify-content:center">
          <button class="btn btn-s btn-sm" onclick="openEdit(${r.id})">✏️ تعديل</button>
          ${isAdmin?`<button class="btn btn-d btn-sm" onclick="delReq(${r.id})">🗑</button>`:''}
        </div></td>
      </tr>`).join(''):'<tr><td colspan="10" class="t-empty">لا توجد نتائج مطابقة</td></tr>'}
      </tbody>
    </table>`;
  let pgn=`<span>${tot} طلب — صفحة ${flt.page} من ${pages}</span><div class="pg-btns">`;
  for(let i=1;i<=pages;i++) pgn+=`<button class="pg-btn ${i===flt.page?'act':''}" onclick="flt.page=${i};applyFlt()">${i}</button>`;
  pgn+='</div>';
  document.getElementById('rpgn').innerHTML=pgn;
}

function getFD(){
  return{
    schoolNum:document.getElementById('f-sn')?.value.trim(),
    submitDate:document.getElementById('f-sd')?.value,
    schoolName:document.getElementById('f-nm')?.value.trim(),
    respName:document.getElementById('f-rn')?.value.trim(),
    contact:document.getElementById('f-cn')?.value.trim(),
    reqType:(function(){
      var boxes=document.querySelectorAll('input[name="f-rt"]:checked');
      var vals=[]; boxes.forEach(function(b){vals.push(b.value);}); return vals.join(' / ');
    })(),
    reqTypes:(function(){
      var boxes=document.querySelectorAll('input[name="f-rt"]:checked');
      var vals=[]; boxes.forEach(function(b){vals.push(b.value);}); return vals;
    })(),
    execDate:document.getElementById('f-ed')?.value,
    execTime:document.getElementById('f-et')?.value,
    trainer:(function(){
      var boxes=document.querySelectorAll('input[name="f-tr"]:checked');
      var vals=[]; boxes.forEach(function(b){vals.push(b.value);}); return vals.join(' / ');
    })(),
    trainers:(function(){
      var boxes=document.querySelectorAll('input[name="f-tr"]:checked');
      var vals=[]; boxes.forEach(function(b){vals.push(b.value);}); return vals;
    })(),
    status:document.getElementById('f-st')?.value||'انتظار',
    notes:document.getElementById('f-nt')?.value.trim(),
  };
}
function saveReq(editId){
  const d=getFD();
  if(!d.schoolNum){toast('يرجى إدخال رقم طلب المدرسة','err');return;}
  if(!d.schoolName){toast('يرجى إدخال اسم المدرسة','err');return;}
  if(!d.reqType||d.reqType.trim()===''){toast('يرجى اختيار نوع الطلب واحد على الأقل','err');return;}
  // ── تحقق من تكرار اسم المدرسة — بدون اشتراط كلمة مدرسة ──
  if(!editId){
    // دالة تنظيف الاسم: تحذف كلمة مدرسة/school وتوحد المسافات
    function cleanName(n){
      return n.trim()
        .replace(/مدرسة/g,'')
        .replace(/school/gi,'')
        .replace(/\s+/g,' ')
        .trim()
        .toLowerCase();
    }
    const newClean = cleanName(d.schoolName);
    const dup = db.requests.find(function(r){
      return cleanName(r.schoolName) === newClean && newClean !== '';
    });
    if(dup){
      const dupDate = dup.execDate || dup.submitDate || '—';
      alert(
        '🚫 لا يمكن إضافة الطلب\n\n'
        + 'هذه المدرسة مسجلة مسبقاً في النظام!\n\n'
        + 'الاسم المسجل: ' + dup.schoolName + '\n'
        + 'نوع الطلب السابق: ' + dup.reqType + '\n'
        + 'تاريخ الطلب السابق: ' + dupDate + '\n'
        + 'الحالة: ' + dup.status + '\n\n'
        + 'لا يمكن تسجيل طلب لهذه المدرسة مرة أخرى.'
      );
      go('reqs');
      return;
    }
  }
  d.addedBy=CU.fullName;
  if(editId){
    const i=db.requests.findIndex(r=>r.id===editId);
    if(i!==-1) db.requests[i]={...db.requests[i],...d};
    toast('تم تعديل الطلب بنجاح ✅','ok');
  }else{
    d.id=db.nextId++;
    db.requests.push(d);
    toast('تم حفظ الطلب بنجاح ✅','ok');
  }
  save(); go('reqs');
}
function openEdit(id){
  const r=db.requests.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('page-body').innerHTML=renderForm(r,id);
  setTimeout(updateEmailBtn,100);
  document.getElementById('page-title').textContent='تعديل الطلب';
}
function delReq(id){
  if(CU.role!=='ADMIN'){toast('الحذف للمدير فقط','err');return;}
  if(!confirm('هل تريد حذف هذا الطلب؟ لا يمكن التراجع.')) return;
  db.requests=db.requests.filter(r=>r.id!==id);
  save(); toast('تم الحذف','ok'); applyFlt();
}

function renderStats(){
  const R=db.requests;

  // حسب النوع — جميع الأنواع المعرّفة، حتى ذات العدد صفر
  const byType=db.reqTypes.map(function(t){
    var n=0;
    R.forEach(function(r){
      if(r.reqType){var types=r.reqType.split('/').map(function(x){return x.trim();});if(types.indexOf(t)>-1)n++;}
    });
    return {l:t,n:n};
  });
  const totType=byType.reduce(function(s,x){return s+x.n;},0);

  // حسب الحالة
  const bySt=db.statuses.map(function(s){return {l:s,n:R.filter(function(r){return r.status===s;}).length};});
  const totSt=bySt.reduce(function(s,x){return s+x.n;},0);

  // حسب المدرب — جميع المدربين المعرّفين، حتى ذات العدد صفر
  const byTr=db.trainers.map(function(t){
    var n=0;
    R.forEach(function(r){
      if(r.trainer){var trs=r.trainer.split('/').map(function(x){return x.trim();});if(trs.indexOf(t.name)>-1)n++;}
    });
    return {l:t.name,n:n};
  });
  const totTr=byTr.reduce(function(s,x){return s+x.n;},0);

  const byMon=months.map(function(m,i){
    return {l:m,n:R.filter(function(r){return r.submitDate&&new Date(r.submitDate).getFullYear()===yr&&new Date(r.submitDate).getMonth()===i;}).length};
  });
  const yrTot=byMon.reduce(function(s,x){return s+x.n;},0);

function printReport(type){
  var now=new Date(), yr=now.getFullYear(), mo=now.getMonth(), q=Math.floor(mo/3);
  var filtered=db.requests, title='';

  if(type==='month'){
    filtered=db.requests.filter(function(r){
      if(!r.submitDate) return false;
      var d=new Date(r.submitDate);
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    title='التقرير الشهري - '+now.toLocaleDateString('ar-QA',{month:'long',year:'numeric'});
  } else if(type==='quarter'){
    filtered=db.requests.filter(function(r){
      if(!r.submitDate) return false;
      var d=new Date(r.submitDate);
      return d.getFullYear()===yr && Math.floor(d.getMonth()/3)===q;
    });
    title='التقرير الربع سنوي - Q'+(q+1)+' / '+yr;
  } else if(type==='year'){
    filtered=db.requests.filter(function(r){
      return r.submitDate && new Date(r.submitDate).getFullYear()===yr;
    });
    title='التقرير السنوي - '+yr;
  } else {
    title='التقرير الشامل - جميع الطلبات';
  }

  if(filtered.length===0){
    var avail=[];
    db.requests.forEach(function(r){
      if(r.submitDate){
        var d=new Date(r.submitDate);
        var k=d.getFullYear()+'-'+(d.getMonth()+1);
        if(avail.indexOf(k)===-1) avail.push(k);
      }
    });
    avail.sort();
    var availMsg=avail.length?('\nالفترات المتاحة:\n'+avail.join('\n')):'\nلا توجد أي طلبات مسجلة بعد.';
    if(!confirm('لا توجد طلبات للفترة المحددة.'+availMsg+'\n\nهل تطبع التقرير الشامل؟')) return;
    filtered=db.requests;
    title='التقرير الشامل - جميع الطلبات';
  }

  // ── مجموع كل نوع طلب ──
  var typeMap={};
  db.reqTypes.forEach(function(t){ typeMap[t]=0; });
  filtered.forEach(function(r){
    if(r.reqType){
      r.reqType.split('/').forEach(function(t){
        t=t.trim();
        if(typeMap[t]===undefined) typeMap[t]=0;
        typeMap[t]++;
      });
    }
  });
  var typeRows='', typeTotal=0;
  Object.entries(typeMap).forEach(function(e,i){

function openTrainerPeriodModal(type){
  var now = new Date();
  var curYear = now.getFullYear();
  var curMonth = now.getMonth();

  var years = [];
  db.requests.forEach(function(r){
    var y = r.submitDate ? new Date(r.submitDate).getFullYear() : null;
    if(y && years.indexOf(y)===-1) years.push(y);
  });
  years.sort(function(a,b){return b-a;});
  if(years.indexOf(curYear)===-1) years.unshift(curYear);

  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var yearOpts = years.map(function(y){
    return '<option value="'+y+'"'+(y===curYear?' selected':'')+'>'+y+'</option>';
  }).join('');

  var selector = '';
  if(type==='month'){
    var monthOpts = MONTHS.map(function(m,i){
      return '<option value="'+i+'"'+(i===curMonth?' selected':'')+'>'+m+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الشهر</label><select class="fsel2" id="tp-month">'+monthOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="tp-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else {
    selector = '<div><label class="flbl">السنة</label>'
      +'<select class="fsel2" id="tp-year" style="max-width:200px">'+yearOpts+'</select></div>';
  }

  showModal('<div class="mhdr"><span class="mhdr-title">🖨 إحصائية المدربين – '+(type==='month'?'شهري':'سنوي')+'</span>'
    +'<button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="mbody"><p style="font-size:12px;color:var(--g3);margin-bottom:16px">اختر الفترة الزمنية:</p>'
    +selector+'</div>'
    +'<div class="mfoot">'
    +'<button class="btn btn-s" onclick="closeModal()">إلغاء</button>'
    +'<input type="hidden" id="tp-type" value="'+type+'">'
    +'<button class="btn btn-p" id="tp-confirm" onclick="confirmTrainerPeriod()">🖨 طباعة</button>'
    +'</div>');
}

function printTrainer(type){

}

function printTrainerCustom(type, yr, mo){
  var now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
  var filtered=db.requests, label='';

  if(type==='month'){
    filtered=db.requests.filter(function(r){
      if(!r.submitDate) return false;
      var d=new Date(r.submitDate);
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    label=now.toLocaleDateString('ar-QA',{month:'long',year:'numeric'});
    if(filtered.length===0){
      if(!confirm('لا توجد بيانات لهذا الشهر.\nهل تطبع الاحصائية السنوية بدلا من ذلك؟')) return;
      filtered=db.requests.filter(function(r){return r.submitDate&&new Date(r.submitDate).getFullYear()===yr;});
      label='السنة '+yr;
      if(!filtered.length){alert('لا توجد بيانات');return;}
    }
  } else {
    filtered=db.requests.filter(function(r){return r.submitDate&&new Date(r.submitDate).getFullYear()===yr;});
    label='السنة '+yr;
    if(!filtered.length){alert('لا توجد بيانات للسنة الحالية');return;}
  }

  var title='احصائية المدربين - '+label;
  var totAll=filtered.length;
  var doneAll=filtered.filter(function(r){return r.status==='مكتملة';}).length;
  var pctDone=totAll?Math.round(doneAll/totAll*100):0;

  var tmap={};
  filtered.forEach(function(r){
    var tr=r.trainer||'غير محدد';
    if(!tmap[tr]) tmap[tr]={name:tr,total:0,done:0,prog:0,wait:0,other:0,types:{}};
    tmap[tr].total++;
    if(r.status==='مكتملة') tmap[tr].done++;
    else if(r.status==='قيد التنفيذ') tmap[tr].prog++;
    else if(r.status==='انتظار') tmap[tr].wait++;
    else tmap[tr].other++;
    var tp=r.reqType||'أخرى';
    tmap[tr].types[tp]=(tmap[tr].types[tp]||0)+1;
  });

  var trainers=Object.values(tmap).sort(function(a,b){return b.total-a.total;});

  var rows=trainers.map(function(t,i){
    var types=Object.entries(t.types).map(function(e){return e[0]+': '+e[1];}).join(' | ');
    return '<tr>'
      +'<td>'+(i+1)+'</td>'
      +'<td style="text-align:right;font-weight:700">'+t.name+'</td>'
      +'<td style="font-size:14px;font-weight:900;color:#1B2A4A">'+t.total+'</td>'
      +'<td style="color:#1E6B3C;font-weight:700">'+t.done+'</td>'
      +'<td style="color:#1A4A7A;font-weight:700">'+t.prog+'</td>'
      +'<td style="color:#C45E0A;font-weight:700">'+t.wait+'</td>'
      +'<td style="color:#C0392B;font-weight:700">'+t.other+'</td>'
      +'<td style="font-size:10px;text-align:right">'+types+'</td>'
      +'</tr>';
  }).join('');

  var totalRow='<tr style="background:#1B2A4A;color:#fff;font-weight:700;font-size:13px">'
    +'<td colspan="2" style="text-align:right;padding:10px;color:#FFFFFF">المجموع الكلي</td>'
    +'<td style="font-size:18px;color:#C9A84C">'+totAll+'</td>'
    +'<td>'+doneAll+'</td>'
    +'<td>'+filtered.filter(function(r){return r.status==='قيد التنفيذ';}).length+'</td>'
    +'<td>'+filtered.filter(function(r){return r.status==='انتظار';}).length+'</td>'
    +'<td>'+filtered.filter(function(r){return r.status==='ملغاة'||r.status==='مؤجلة';}).length+'</td>'
    +'<td></td>'
    +'</tr>';

  var ps='<style>'
    +'body{font-family:Calibri,Arial,sans-serif;padding:24px;direction:rtl;color:#1A1816;background:#fff}'
    +'h2{color:#1B2A4A;font-size:15px;margin-bottom:4px}'
    +'.meta{font-size:11px;color:#555;margin-bottom:14px;border-bottom:3px solid #1B2A4A;padding-bottom:8px}'
    +'.kbox{display:inline-block;background:#EEF1F7;border-right:4px solid #1B2A4A;padding:10px 16px;margin:0 4px 14px;border-radius:6px;text-align:center;min-width:88px}'
    +'.knum{font-size:22px;font-weight:900;color:#1B2A4A}'
    +'.klbl{font-size:10px;color:#888}'
    +'table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}'
    +'thead th{background:#1B2A4A;color:#fff;padding:9px 10px;text-align:center;font-weight:700;border-bottom:2px solid #C9A84C}'
    +'td{padding:8px 10px;border:1px solid #ddd;text-align:center;color:#1A1816}'
    +'tr:nth-child(even){background:#F4F6FB}'
    +'.footer{margin-top:18px;font-size:10px;color:#999;text-align:center;border-top:1px solid #ddd;padding-top:8px}'
    +'</style>';

  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>'+title+'</title>'+ps+'</head><body>'
    +'<h2>نظام ادارة طلبات المدارس - قسم التثقيف الوقائي</h2>'
    +'<div class="meta">'+title+' | تاريخ الطباعة: '+now.toLocaleDateString('ar-QA')+'</div>'
    +'<div style="margin-bottom:8px">'
    +'<div class="kbox"><div class="knum">'+totAll+'</div><div class="klbl">اجمالي الطلبات</div></div>'
    +'<div class="kbox" style="border-color:#1E6B3C"><div class="knum" style="color:#1E6B3C">'+doneAll+'</div><div class="klbl">مكتملة</div></div>'
    +'<div class="kbox" style="border-color:#C9A84C"><div class="knum" style="color:#B8900A">'+trainers.length+'</div><div class="klbl">عدد المدربين</div></div>'
    +'<div class="kbox" style="border-color:#1A4A7A"><div class="knum" style="color:#1A4A7A">'+pctDone+'%</div><div class="klbl">معدل الانجاز</div></div>'
    +'</div>'
    +'<table><thead><tr>'
    +'<th style="width:40px">#</th>'
    +'<th>المدرب/ة</th>'
    +'<th style="width:70px">الاجمالي</th>'
    +'<th style="width:70px">مكتملة</th>'
    +'<th style="width:80px">قيد التنفيذ</th>'
    +'<th style="width:65px">انتظار</th>'
    +'<th style="width:80px">ملغاة/مؤجلة</th>'
    +'<th>انواع الطلبات</th>'
    +'</tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="8" style="text-align:center;padding:14px;color:#aaa">لا توجد بيانات</td></tr>')+totalRow+'</tbody></table>'
    +'<div class="footer">الادارة العامة للدفاع المدني - دولة قطر</div>'
    +'</body></html>');
  w.document.close(); w.focus(); setTimeout(function(){w.print();},600);
}

function exportCSV(){
  const hdr=['#','رقم الطلب','تاريخ التقديم','اسم المدرسة','المسؤول','التواصل','نوع الطلب','تاريخ التنفيذ','وقت التنفيذ','المدرب','الحالة','الملاحظات','أدخل بواسطة'];
  const rows=db.requests.map(r=>[r.id,r.schoolNum,r.submitDate,r.schoolName,r.respName,r.contact,r.reqType,r.execDate,r.execTime,r.trainer,r.status,r.notes,r.addedBy].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[hdr.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`طلبات_المدارس_${td()}.csv`; a.click();
}

function openUserModal(id=null){
  const u=id?db.users.find(x=>x.id===id):null;
  showModal(`
    <div class="mhdr"><span class="mhdr-title">${u?'تعديل مستخدم':'مستخدم جديد'}</span><button class="mclose" onclick="closeModal('umodal')">✕</button></div>
    <div class="mbody">
      <div class="fgrid" style="grid-template-columns:1fr">
        <div><label class="flbl">اسم المستخدم *</label><input class="finp" id="um-u" value="${u?.username||''}"></div>
        <div><label class="flbl">كلمة المرور ${u?'(اتركه فارغاً للإبقاء على الحالي)':'*'}</label><input class="finp" id="um-p" value="${u?.password||''}"></div>
        <div><label class="flbl">الاسم الكامل *</label><input class="finp" id="um-n" value="${u?.fullName||''}"></div>
        <div><label class="flbl">الصلاحية</label>
          <select class="fsel2" id="um-r">
            <option value="USER" ${u?.role==='USER'?'selected':''}>USER – مستخدم عادي</option>
            <option value="ADMIN" ${u?.role==='ADMIN'?'selected':''}>ADMIN – مدير كامل الصلاحيات</option>
          </select>
        </div>
      </div>
    </div>
    <div class="mfoot"><button class="btn btn-s" onclick="closeModal('umodal')">إلغاء</button><button class="btn btn-p" onclick="saveUser(${id||'null'})">💾 حفظ</button></div>
  `,'umodal');
}
function saveUser(id){
  const u=document.getElementById('um-u').value.trim();
  const p=document.getElementById('um-p').value.trim();
  const n=document.getElementById('um-n').value.trim();
  const r=document.getElementById('um-r').value;
  if(!u||!n){toast('يرجى تعبئة الحقول المطلوبة','err');return;}
  if(id){
    const usr=db.users.find(x=>x.id===id);
    if(usr){usr.username=u;if(p)usr.password=p;usr.fullName=n;usr.role=r;}
    toast('تم تعديل المستخدم','ok');
  }else{
    if(!p){toast('يرجى إدخال كلمة المرور','err');return;}
    if(db.users.find(x=>x.username===u)){toast('اسم المستخدم موجود مسبقاً','err');return;}
    db.users.push({id:Date.now(),username:u,password:p,fullName:n,role:r,active:true});
    toast('تم إضافة المستخدم ✅','ok');
  }
  save(); closeModal('umodal'); go('users');
}
function toggleUser(id){
  const u=db.users.find(x=>x.id===id);
  if(!u) return;
  if(u.username==='admin'){toast('لا يمكن تعطيل الحساب الرئيسي','err');return;}
  u.active=!u.active; save();
  toast(u.active?'تم تفعيل الحساب ✅':'تم إلغاء التفعيل','ok');
  go('users');
}
function changePassModal(id){
  const u=db.users.find(x=>x.id===id);
  showModal(`
    <div class="mhdr"><span class="mhdr-title">🔑 تغيير كلمة مرور: ${u?.fullName}</span><button class="mclose" onclick="closeModal('umodal')">✕</button></div>
    <div class="mbody">
      <div class="fgrid" style="grid-template-columns:1fr">
        <div><label class="flbl">كلمة المرور الجديدة *</label><input class="finp" id="cp-n" type="password"></div>
        <div><label class="flbl">تأكيد كلمة المرور *</label><input class="finp" id="cp-c" type="password"></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn btn-s" onclick="closeModal('umodal')">إلغاء</button><button class="btn btn-p" onclick="doChangePass(${id})">💾 تغيير</button></div>
  `,'umodal');
}
function doChangePass(id){
  const nw=document.getElementById('cp-n').value, cf=document.getElementById('cp-c').value;
  if(!nw){toast('يرجى إدخال كلمة المرور الجديدة','err');return;}
  if(nw!==cf){toast('كلمتا المرور غير متطابقتين','err');return;}
  const u=db.users.find(x=>x.id===id);
  if(u){u.password=nw;save();}
  toast('تم تغيير كلمة المرور ✅','ok'); closeModal('umodal');
}

function addListItem(key){
  const inp=document.getElementById(`li-${key}`);
  const val=inp?.value.trim();
  if(!val){toast('يرجى إدخال قيمة','err');return;}
  if(db[key].includes(val)){toast('العنصر موجود مسبقاً','err');return;}
  db[key].push(val); save(); toast('تمت الإضافة ✅','ok'); go('lists');
}
function addTrainerWithEmail(){
  var name = document.getElementById('li-trainer-name')?.value.trim();
  var email = document.getElementById('li-trainer-email')?.value.trim();
  if(!name){toast('يرجى إدخال اسم المدرب','err');return;}
  if(db.trainers.find(function(t){return (typeof t==='string'?t:t.name)===name;})){
    toast('المدرب موجود مسبقاً','err');return;
  }
  db.trainers.push({name:name,email:email||''});
  save(); toast('تمت الإضافة ✅','ok'); go('lists');
}
function saveTrainerRow(i){
  var nameInp  = document.getElementById('tr-nm-'+i);
  var emailInp = document.getElementById('tr-em-'+i);
  if(!nameInp || !emailInp) return;
  var newName  = nameInp.value.trim();
  var newEmail = emailInp.value.trim();
  if(!newName){ toast('يرجى كتابة اسم المدرب','err'); return; }
  if(typeof db.trainers[i]==='string'){
    db.trainers[i] = {name:newName, email:newEmail};
  } else {
    db.trainers[i].name  = newName;
    db.trainers[i].email = newEmail;
  }
  save(); toast('تم الحفظ ✅','ok');
  renderPage('lists');
}
function saveTrainerEmail(i){
  var inp = document.getElementById('tr-em-'+i);
  if(!inp) return;
  var email = inp.value.trim();
  updateTrainerEmail(i, email);
}
function updateTrainerEmail(i,email){
  if(db.trainers[i]){
    if(typeof db.trainers[i]==='string'){
      db.trainers[i]={name:db.trainers[i],email:email.trim()};
    } else {
      db.trainers[i].email=email.trim();
    }
    save(); toast('تم حفظ الإيميل ✅','ok');
  }
}
function delTrainer(i){
  if(!confirm('هل تريد حذف هذا المدرب؟')) return;
  db.trainers.splice(i,1);
  save(); toast('تم الحذف','ok'); go('lists');
}
function delListItem(key,i){
  if(!confirm('هل تريد حذف هذا العنصر؟')) return;
  if(key==='trainers'){
    db.trainers.splice(i,1);
  } else {
    db[key].splice(i,1);
  }
  save(); toast('تم الحذف','ok'); go('lists');
}

function bindMedia(){applyMFlt();}
function applyMFlt(){
  mflt.q=(document.getElementById('mq')?.value||'').toLowerCase();
  mflt.type=document.getElementById('mt')?.value||'';
  const filtered=db.media.filter(m=>{
    const mq=!mflt.q||m.title.toLowerCase().includes(mflt.q)||(m.notes||'').toLowerCase().includes(mflt.q);
    const mt=!mflt.type||m.mediaType===mflt.type;
    return mq&&mt;
  });
  const tot=filtered.length, pages=Math.max(1,Math.ceil(tot/PS));
  mflt.page=Math.min(mflt.page,pages);
  const slice=filtered.slice((mflt.page-1)*PS,mflt.page*PS).slice().reverse();
  const isAdmin=CU.role==='ADMIN';
  document.getElementById('mtb').innerHTML=`
    <table>
      <thead><tr><th>#</th><th>التاريخ</th><th>نوع النشاط</th><th>العنوان / الوصف</th><th>الملاحظات</th><th class="no-print">أدخل بواسطة</th><th class="no-print">إجراءات</th></tr></thead>
      <tbody>${slice.length?slice.map((m,i)=>`<tr>
        <td style="font-weight:700;color:var(--red)">${(mflt.page-1)*PS+i+1}</td>
        <td>${m.date||'—'}</td>
        <td><span class="badge bprog">${m.mediaType}</span></td>
        <td style="text-align:right;font-size:11.5px">${m.title||'—'}</td>
        <td style="text-align:right;font-size:11px;color:var(--g3)">${m.notes||'—'}</td>
        <td style="font-size:11px;color:var(--g3)" class="no-print">${m.addedBy}</td>
        <td class="no-print"><div style="display:flex;gap:5px;justify-content:center">
          <button class="btn btn-s btn-sm" onclick="openEditMedia(${m.id})">✏️ تعديل</button>
          ${isAdmin?`<button class="btn btn-d btn-sm" onclick="delMedia(${m.id})">🗑</button>`:''}
        </div></td>
      </tr>`).join(''):'<tr><td colspan="7" class="t-empty">لا توجد أنشطة مسجلة</td></tr>'}
      </tbody>
    </table>`;
  let pgn=`<span>${tot} نشاط — صفحة ${mflt.page} من ${pages}</span><div class="pg-btns">`;
  for(let i=1;i<=pages;i++) pgn+=`<button class="pg-btn ${i===mflt.page?'act':''}" onclick="mflt.page=${i};applyMFlt()">${i}</button>`;
  pgn+='</div>';
  document.getElementById('mpgn').innerHTML=pgn;
}

// ── طباعة تقرير الإعلام ──────────────────────────────────
function openMediaPeriodModal(type){
  var now = new Date();
  var curYear = now.getFullYear();
  var curMonth = now.getMonth();
  var curQ = Math.floor(curMonth/3);

  var years = [];
  db.media.forEach(function(m){
    var y = m.date ? new Date(m.date).getFullYear() : null;
    if(y && years.indexOf(y)===-1) years.push(y);
  });
  years.sort(function(a,b){return b-a;});
  if(years.indexOf(curYear)===-1) years.unshift(curYear);

  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var QUARTERS=['الربع الأول (يناير–مارس)','الربع الثاني (أبريل–يونيو)','الربع الثالث (يوليو–سبتمبر)','الربع الرابع (أكتوبر–ديسمبر)'];
  var typeNames={month:'شهري',quarter:'ربع سنوي',year:'سنوي'};

  var yearOpts = years.map(function(y){
    return '<option value="'+y+'"'+(y===curYear?' selected':'')+'>'+y+'</option>';
  }).join('');

  var selector = '';
  if(type==='month'){
    var monthOpts = MONTHS.map(function(m,i){
      return '<option value="'+i+'"'+(i===curMonth?' selected':'')+'>'+m+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الشهر</label><select class="fsel2" id="mp-month">'+monthOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="mp-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else if(type==='quarter'){
    var qOpts = QUARTERS.map(function(q,i){
      return '<option value="'+i+'"'+(i===curQ?' selected':'')+'>'+q+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الربع السنوي</label><select class="fsel2" id="mp-quarter">'+qOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="mp-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else {
    selector = '<div><label class="flbl">السنة</label>'
      +'<select class="fsel2" id="mp-year" style="max-width:200px">'+yearOpts+'</select></div>';
  }

  showModal('<div class="mhdr"><span class="mhdr-title">🖨 تقرير الإعلام – '+typeNames[type]+'</span>'
    +'<button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="mbody"><p style="font-size:12px;color:var(--g3);margin-bottom:16px">اختر الفترة الزمنية:</p>'
    +selector+'</div>'
    +'<div class="mfoot">'
    +'<button class="btn btn-s" onclick="closeModal()">إلغاء</button>'
    +'<input type="hidden" id="mp-type" value="'+type+'">'
    +'<button class="btn btn-p" onclick="confirmMediaPeriod()">🖨 طباعة</button>'
    +'</div>');
}

function confirmMediaPeriod(){
  var type = document.getElementById('mp-type')?.value || 'month';
  var yr   = parseInt(document.getElementById('mp-year')?.value   || new Date().getFullYear());
  var mo   = parseInt(document.getElementById('mp-month')?.value  ?? new Date().getMonth());
  var q    = parseInt(document.getElementById('mp-quarter')?.value ?? Math.floor(new Date().getMonth()/3));
  closeModal();

  var now = new Date();
  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var QUARTERS=['الربع الأول','الربع الثاني','الربع الثالث','الربع الرابع'];
  var filtered=db.media, title='';

  if(type==='month'){
    filtered=db.media.filter(function(m){
      if(!m.date) return false;
      var d=new Date(m.date);
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    title='تقرير الإعلام الشهري – '+MONTHS[mo]+' '+yr;
  } else if(type==='quarter'){
    filtered=db.media.filter(function(m){
      if(!m.date) return false;
      var d=new Date(m.date);
      return d.getFullYear()===yr && Math.floor(d.getMonth()/3)===q;
    });
    title='تقرير الإعلام الربع سنوي – '+QUARTERS[q]+' '+yr;
  } else {
    filtered=db.media.filter(function(m){
      return m.date && new Date(m.date).getFullYear()===yr;
    });
    title='تقرير الإعلام السنوي – '+yr;
  }

  if(filtered.length===0){ alert('لا توجد أنشطة للفترة المحددة: '+title); return; }
  printMediaReportFiltered(filtered, title, now);
}

function printMediaReport(type){
  var now=new Date(), yr=now.getFullYear(), mo=now.getMonth(), q=Math.floor(mo/3);
  var filtered=db.media, title='';
  if(type==='month'){
    filtered=db.media.filter(function(m){ if(!m.date)return false; var d=new Date(m.date); return d.getMonth()===mo&&d.getFullYear()===yr; });
    title='تقرير الإعلام الشهري - '+now.toLocaleDateString('ar-QA',{month:'long',year:'numeric'});
  } else if(type==='quarter'){
    filtered=db.media.filter(function(m){ if(!m.date)return false; var d=new Date(m.date); return d.getFullYear()===yr&&Math.floor(d.getMonth()/3)===q; });
    title='تقرير الإعلام الربع سنوي - Q'+(q+1)+' / '+yr;
  } else if(type==='year'){
    filtered=db.media.filter(function(m){ return m.date&&new Date(m.date).getFullYear()===yr; });
    title='تقرير الإعلام السنوي - '+yr;
  } else {
    title='تقرير الإعلام الشامل - جميع الأنشطة';
  }
  if(filtered.length===0){ alert('لا توجد أنشطة للفترة المحددة.'); return; }
  printMediaReportFiltered(filtered, title, now);
}

function printMediaReportFiltered(filtered, title, now){
  var now=new Date(), yr=now.getFullYear(), mo=now.getMonth(), q=Math.floor(mo/3);
  var filtered=db.media, title='';

  if(type==='month'){
    filtered=db.media.filter(function(m){
      if(!m.date) return false;
      var d=new Date(m.date);
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    title='تقرير الإعلام الشهري - '+now.toLocaleDateString('ar-QA',{month:'long',year:'numeric'});
  } else if(type==='quarter'){
    filtered=db.media.filter(function(m){
      if(!m.date) return false;
      var d=new Date(m.date);
      return d.getFullYear()===yr && Math.floor(d.getMonth()/3)===q;
    });
    title='تقرير الإعلام الربع سنوي - Q'+(q+1)+' / '+yr;
  } else if(type==='year'){
    filtered=db.media.filter(function(m){
      return m.date && new Date(m.date).getFullYear()===yr;
    });
    title='تقرير الإعلام السنوي - '+yr;
  } else {
    title='تقرير الإعلام الشامل - جميع الأنشطة';
  }

  if(filtered.length===0){
    var avail=[];
    db.media.forEach(function(m){
      if(m.date){
        var d=new Date(m.date);
        var k=d.getFullYear()+'-'+(d.getMonth()+1);
        if(avail.indexOf(k)===-1) avail.push(k);
      }
    });
    avail.sort();
    var availMsg = avail.length ? ('\nالفترات المتاحة:\n'+avail.join('\n')) : '\nلا توجد أي أنشطة مسجلة بعد.';
    if(!confirm('لا توجد أنشطة للفترة المحددة.'+availMsg+'\n\nهل تطبع التقرير الشامل؟')) return;
    filtered=db.media;
    title='تقرير الإعلام الشامل - جميع الأنشطة';
  }

  // مجموع كل نوع نشاط (كل الأنواع المعرّفة، حتى الصفر)
  var typeMap={};
  db.mediaTypes.forEach(function(t){ typeMap[t]=0; });

    var t=m.mediaType||'أخرى';

    typeMap[t]++;
  });

  });

  var ps='<style>'
    +'body{font-family:Calibri,Arial,sans-serif;padding:24px;direction:rtl;color:#1A1816;background:#fff}'
    +'h2{color:#1B2A4A;font-size:15px;margin-bottom:4px}'
    +'.meta{font-size:11px;color:#555;margin-bottom:14px;border-bottom:3px solid #1B2A4A;padding-bottom:8px}'
    +'.kbox{display:inline-block;background:#EEF1F7;border-right:4px solid #1B2A4A;padding:10px 16px;margin:0 4px 14px;border-radius:6px;text-align:center;min-width:88px}'
    +'.knum{font-size:22px;font-weight:900;color:#1B2A4A}'
    +'.klbl{font-size:10px;color:#888}'
    +'.sec{font-size:13px;font-weight:700;color:#1B2A4A;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #1B2A4A}'
    +'table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px}'
    +'thead th{background:#1B2A4A;color:#fff;padding:9px 10px;text-align:center;font-weight:700;border-bottom:2px solid #C9A84C}'
    +'td{padding:8px 10px;border:1px solid #ddd;text-align:center;color:#1A1816}'
    +'tr:nth-child(even){background:#F4F6FB}'
    +'.footer{margin-top:18px;font-size:10px;color:#999;text-align:center;border-top:1px solid #ddd;padding-top:8px}'
    +'</style>';

  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>'+title+'</title>'+ps+'</head><body>'
    +'<h2>نظام ادارة طلبات المدارس - قسم التثقيف الوقائي</h2>'
    +'<div class="meta">'+title+' | تاريخ الطباعة: '+now.toLocaleDateString('ar-QA')+'</div>'
    +'<div style="margin-bottom:8px">'
    +'<div class="kbox"><div class="knum">'+filtered.length+'</div><div class="klbl">اجمالي الأنشطة</div></div>'
    +'</div>'
    +'<div class="sec">مجموع الأنشطة الإعلامية حسب النوع</div>'
    +'<table><thead><tr><th style="width:40px">#</th><th>نوع النشاط</th><th style="width:80px">العدد</th></tr></thead>'
    +'<tbody>'+typeRows+'</tbody></table>'
    +'<div style="text-align:center;margin:18px 0 8px;font-size:13px;font-weight:700;color:#1B2A4A;border-bottom:2px solid #1B2A4A;padding-bottom:6px">الرسم البياني</div>'
    +'<div style="max-width:520px;margin:14px auto;border:1px solid #E0E6F0;border-radius:8px;padding:14px">'
    +'<div style="text-align:center;font-size:12px;font-weight:700;color:#1B2A4A;margin-bottom:10px">📊 الأنشطة حسب النوع</div>'
    +'<canvas id="mc1" width="480" height="280"></canvas></div>'
    +'<div class="footer">الادارة العامة للدفاع المدني - دولة قطر</div>'
    +'</body></html>');
  w.document.close();

  w.addEventListener('load', function(){
    var chartScript = document.querySelectorAll('script')[0].textContent;
    var s1 = w.document.createElement('script');
    s1.textContent = chartScript;
    w.document.head.appendChild(s1);
    var COLORS = ['#1B2A4A','#1A4A7A','#1E6B3C','#C45E0A','#C9A84C','#C0392B','#8A8680','#6B4FA0','#2E8B57','#B8860B'];
    var tL = Object.keys(typeMap);
    var tD = Object.values(typeMap);
    var tB = tL.map(function(_,i){return COLORS[i%COLORS.length];});
    var s2 = w.document.createElement('script');
    s2.textContent = 'new Chart(document.getElementById("mc1"),{type:"bar",data:{labels:'+JSON.stringify(tL)+',datasets:[{label:"العدد",data:'+JSON.stringify(tD)+',backgroundColor:'+JSON.stringify(tB)+',borderWidth:0,borderRadius:4}]},options:{responsive:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:40},grid:{display:false}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}}}}}});setTimeout(function(){window.print();},600);';
    w.document.body.appendChild(s2);
  });
}

function showEvalPage(trainer, type, school){

  var loginEl = document.getElementById('login-screen');
  var appEl   = document.getElementById('app');
  if(loginEl) loginEl.style.display='none';
  if(appEl)   appEl.style.display='none';

  var CHOICES = [

    {v:3,label:'جيد',emoji:'🙂',cls:'c3'},
    {v:2,label:'مقبول',emoji:'😐',cls:'c2'},

  var TYPE_Q = {
    'محاضرة توعوية':['هل كان محتوى المحاضرة واضحاً ومفهوماً؟','هل كانت المعلومات المقدمة مفيدة وذات صلة؟','هل تناسبت المحاضرة مع الفئة العمرية المستهدفة؟','هل شعرت بأن المحاضرة حققت هدفها التوعوي؟'],

    'تدريب إيواء':['هل كانت خطوات الإيواء واضحة ومفهومة؟','هل وضّح المدرب الفرق بين الإخلاء والإيواء؟','هل التدريب العملي كافٍ لاكتساب مهارة الإيواء؟','هل شعرت بالقدرة على تطبيق الإيواء في حالات الطوارئ؟'],
    'استخدام الطفايات':['هل شرح المدرب أنواع الطفايات واستخداماتها بوضوح؟','هل التطبيق العملي على الطفايات كان كافياً؟','هل شعرت بالثقة في استخدام الطفاية بعد التدريب؟','هل التزم التدريب بإجراءات السلامة الضرورية؟'],
    'معرض توعوي':['هل كانت عروض المعرض جذابة ومفيدة؟','هل المواد والنماذج المعروضة واضحة ومعبّرة؟','هل استفدت من المعلومات المقدمة في المعرض؟','هل كان المعرض منظماً ويسهل التجول فيه؟'],
    'زيارة ميدانية':['هل كانت الزيارة الميدانية منظمة وتسير وفق برنامج واضح؟','هل استفدت من المشاهدة الميدانية في تعزيز معلوماتك؟','هل التزمت الزيارة بإجراءات السلامة اللازمة؟','هل أُتيحت لك فرصة لطرح الأسئلة والاستفسار؟'],
    'ورشة عمل':['هل كانت أنشطة الورشة تفاعلية ومحفزة للمشاركة؟','هل حققت الورشة أهدافها التدريبية المعلنة؟','هل المواد والأدوات المستخدمة في الورشة كانت كافية؟','هل شعرت بأنك أسهمت بفاعلية في أنشطة الورشة؟'],
  };

  var TRAINER_Q = [
    'هل وضّح المدرب أهداف الجلسة بشكل واضح منذ البداية؟',
    'هل أتقن المدرب المادة العلمية التي قدّمها؟',
    'هل كان شرح المدرب واضحاً وسهل الفهم؟',
    'هل ربط المدرب المعلومات بأمثلة وتطبيقات واقعية؟',
    'هل استخدم المدرب أساليب متنوعة تجعل الجلسة شيقة؟',
    'هل التزم المدرب بالوقت المحدد دون إخلال؟',
    'هل شجّعك المدرب على المشاركة وطرح الأسئلة؟',
    'هل تعامل المدرب مع جميع المتدربين باحترام ومساواة؟',
    'هل أجاب المدرب على استفساراتك بصبر ودقة؟',
    'هل تحقق المدرب من فهمك للمعلومات المقدمة؟',
    'هل كان المدرب ملتزماً بالمظهر اللائق والسلوك المهني؟',
    'هل أظهر المدرب حماساً واهتماماً حقيقياً بالموضوع؟',
    'هل شعرت باستفادة حقيقية من هذه الجلسة التدريبية؟',
    'هل ستوصي زملاءك بحضور جلسات تدريبية مع هذا المدرب؟',
    'ما تقييمك الإجمالي لهذا المدرب؟',
  ];

  // Load trainers from db
  var excluded = ['الملازم أول/ صباح التومي','الملازم/ سلطان السقطري'];
  var trainerOpts = '<option value="">-- اختر المدرب --</option>';
  db.trainers.forEach(function(t){
    var name = typeof t==='string'?t:t.name;
    if(name && excluded.indexOf(name)===-1){
      trainerOpts += '<option value="'+name+'"'+(name===trainer?' selected':'')+'>'+name+'</option>';
    }
  });

  var typeOpts = '<option value="">-- اختر نوع التدريب --</option>';
  db.reqTypes.forEach(function(t){
    typeOpts += '<option value="'+t+'"'+(t===type?' selected':'')+'>'+t+'</option>';
  });

  var evalAnswers = {};
  var allQ = (TYPE_Q[type]||[]).concat(TRAINER_Q);
  var typeQCount = (TYPE_Q[type]||[]).length;

  function buildQCards(){
    var t = document.getElementById('ep-type').value;
    allQ = (TYPE_Q[t]||[]).concat(TRAINER_Q);
    typeQCount = (TYPE_Q[t]||[]).length;
    evalAnswers = {};
    var html_ = '';
    if(TYPE_Q[t]){
      html_ += '<div style="font-size:12px;font-weight:700;color:#C9A84C;margin:8px 14px;padding-bottom:6px;border-bottom:2px solid #C9A84C">📋 تقييم الجلسة التدريبية</div>';
      for(var i=0;i<typeQCount;i++) html_ += buildQCard(i);
    }
    html_ += '<div style="font-size:12px;font-weight:700;color:#1B2A4A;margin:12px 14px 8px;padding-bottom:6px;border-bottom:2px solid #1B2A4A">👷 تقييم المدرب شخصياً</div>';
    for(var j=typeQCount;j<allQ.length;j++) html_ += buildQCard(j);
    document.getElementById('ep-questions').innerHTML = html_;
    document.getElementById('ep-open').style.display='block';
    document.getElementById('ep-submit').style.display='block';
  }

  function buildQCard(i){
    var btns = CHOICES.map(function(c){
      return '<button type="button" style="flex:1;min-width:58px;border:2px solid #E0E6F0;background:#F8F9FC;color:#555;border-radius:8px;padding:7px 3px;font-size:11px;font-weight:600;cursor:pointer;font-family:Arial;line-height:1.3;transition:all .15s" '
        +'data-qi="'+i+'" data-v="'+c.v+'" data-cls="'+c.cls+'" onclick="epPick(this)">'+c.emoji+'<br>'+c.label+'</button>';
    }).join('');
    return '<div id="ep-qc-'+i+'" style="background:#fff;margin:0 14px 10px;border-radius:10px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.05)">'
      +'<div style="font-size:10px;color:#C9A84C;font-weight:700;margin-bottom:4px">سؤال '+(i+1)+' من '+allQ.length+'</div>'
      +'<div style="font-size:13px;font-weight:600;color:#1B2A4A;margin-bottom:10px;line-height:1.5">'+allQ[i]+'</div>'

      +'</div>';
  }

  window.epPick = function(btn){
    var qi=parseInt(btn.dataset.qi), v=parseInt(btn.dataset.v), cls=btn.dataset.cls;
    evalAnswers[qi]=v;
    var card=document.getElementById('ep-qc-'+qi);
    card.querySelectorAll('button[data-qi]').forEach(function(b){
      b.style.background='#F8F9FC'; b.style.color='#555'; b.style.borderColor='#E0E6F0';
    });
    var colors={c5:'#1E6B3C',c4:'#1B2A4A',c3:'#C9A84C',c2:'#C45E0A',c1:'#C0392B'};
    btn.style.background=colors[cls]; btn.style.color='#fff'; btn.style.borderColor=colors[cls];
    card.style.border='1.5px solid transparent';
    var done=Object.keys(evalAnswers).length, total=allQ.length;
    document.getElementById('ep-prog').style.width=Math.round(done/total*100)+'%';
    document.getElementById('ep-prog-lbl').textContent=done+' من '+total+' سؤالاً';
  };

  window.epSubmit = function(){
    var trainerVal = document.getElementById('ep-trainer').value;
    var typeVal    = document.getElementById('ep-type').value;
    var schoolVal  = document.getElementById('ep-school').value.trim();
    if(!trainerVal){alert('يرجى اختيار المدرب');return;}
    if(!typeVal){alert('يرجى اختيار نوع التدريب');return;}
    if(!schoolVal){alert('يرجى كتابة اسم المدرسة');return;}
    var missing=[];
    for(var i=0;i<allQ.length;i++) if(evalAnswers[i]===undefined) missing.push(i);
    if(missing.length){
      missing.forEach(function(i){ document.getElementById('ep-qc-'+i).style.border='1.5px solid #C0392B'; });
      alert('يرجى الإجابة على جميع الأسئلة');
      document.getElementById('ep-qc-'+missing[0]).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    var total=0,count=allQ.length;
    for(var k=0;k<count;k++) total+=(evalAnswers[k]||0);
    var avg=(total/count).toFixed(1);
    var grade=avg>=4.5?'ممتاز 🌟':avg>=3.5?'جيد جداً 😊':avg>=2.5?'جيد 🙂':avg>=1.5?'مقبول 😐':'ضعيف 😞';
    db.evaluations.push({
      id:db.evalNextId++, trainerName:trainerVal, schoolName:schoolVal,
      reqType:typeVal, date:new Date().toISOString().split('T')[0],
      answers:evalAnswers,
      oq1:document.getElementById('ep-oq1').value,
      oq2:document.getElementById('ep-oq2').value,
      avg:parseFloat(avg), grade:grade,
      submittedAt:new Date().toISOString()
    });
    save();
    document.body.innerHTML='<div style="max-width:400px;margin:60px auto;padding:30px;text-align:center;font-family:Arial;direction:rtl">'
      +'<div style="font-size:64px;margin-bottom:14px">✅</div>'
      +'<div style="font-size:20px;font-weight:700;color:#1B2A4A;margin-bottom:6px">شكراً على تقييمك!</div>'
      +'<div style="font-size:13px;color:#666;margin-bottom:20px">تم إرسال تقييمك بنجاح</div>'
      +'<div style="background:linear-gradient(135deg,#1B2A4A,#2C4270);color:#fff;border-radius:12px;padding:20px">'
      +'<div style="font-size:11px;opacity:.8;margin-bottom:6px">متوسط تقييمك</div>'
      +'<div style="font-size:40px;font-weight:900;color:#C9A84C">'+avg+'</div>'
      +'<div style="font-size:15px;font-weight:700;margin-top:4px">'+grade+'</div>'
      +'</div></div>';
  };

  var pageHtml = '<div style="font-family:Arial;direction:rtl;background:#EEF1F7;min-height:100vh;padding-bottom:40px">'
    +'<div style="background:linear-gradient(135deg,#1B2A4A,#2C4270);color:#fff;padding:18px 16px;text-align:center">'
    +'<div style="font-size:30px;margin-bottom:4px">🛡</div>'
    +'<div style="font-size:15px;font-weight:700">نموذج تقييم المدرب</div>'
    +'<div style="font-size:11px;opacity:.75;margin-top:2px">قسم التثقيف الوقائي – الإدارة العامة للدفاع المدني</div>'
    +'</div>'
    +'<div style="height:3px;background:linear-gradient(90deg,#C9A84C,#F0D080,#C9A84C)"></div>'
    +'<div style="background:#fff;margin:14px;border-radius:10px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.06);border-right:4px solid #C9A84C">'
    +'<div style="font-size:11px;color:#C9A84C;font-weight:700;margin-bottom:10px">📋 معلومات الجلسة التدريبية</div>'
    +'<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:700;color:#1B2A4A;display:block;margin-bottom:5px">اسم المدرسة *</label>'
    +'<input type="text" id="ep-school" value="'+school+'" placeholder="أدخل اسم المدرسة..." style="width:100%;border:1.5px solid #E0E6F0;border-radius:8px;padding:9px 12px;font-size:13px;font-family:Arial;direction:rtl;background:#F8F9FC"></div>'
    +'<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:700;color:#1B2A4A;display:block;margin-bottom:5px">المدرب / المدربة *</label>'
    +'<select id="ep-trainer" style="width:100%;border:1.5px solid #E0E6F0;border-radius:8px;padding:9px 12px;font-size:13px;font-family:Arial;direction:rtl;background:#F8F9FC">'+trainerOpts+'</select></div>'
    +'<div><label style="font-size:12px;font-weight:700;color:#1B2A4A;display:block;margin-bottom:5px">نوع التدريب *</label>'
    +'<select id="ep-type" onchange="buildQCards()" style="width:100%;border:1.5px solid #E0E6F0;border-radius:8px;padding:9px 12px;font-size:13px;font-family:Arial;direction:rtl;background:#F8F9FC">'+typeOpts+'</select></div>'
    +'</div>'
    +'<div style="background:#E0E6F0;margin:0 14px;border-radius:4px;height:5px"><div id="ep-prog" style="height:100%;background:linear-gradient(90deg,#C9A84C,#1B2A4A);border-radius:4px;transition:width .3s;width:0%"></div></div>'
    +'<div id="ep-prog-lbl" style="text-align:center;font-size:10px;color:#aaa;margin:4px 0 10px">اختر نوع التدريب لتبدأ التقييم</div>'
    +'<div id="ep-questions"></div>'
    +'<div id="ep-open" style="display:none">'
    +'<div style="background:#fff;margin:0 14px 10px;border-radius:10px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.05)">'
    +'<div style="font-size:12px;font-weight:600;color:#1B2A4A;margin-bottom:8px">ما أبرز ما استفدته من هذه الجلسة؟</div>'
    +'<textarea id="ep-oq1" style="width:100%;border:1.5px solid #E0E6F0;border-radius:8px;padding:10px;font-family:Arial;font-size:12px;min-height:70px;direction:rtl;background:#F8F9FC" placeholder="اكتب هنا..."></textarea></div>'
    +'<div style="background:#fff;margin:0 14px 10px;border-radius:10px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.05)">'
    +'<div style="font-size:12px;font-weight:600;color:#1B2A4A;margin-bottom:8px">ما الجوانب التي تقترح تحسينها؟</div>'
    +'<textarea id="ep-oq2" style="width:100%;border:1.5px solid #E0E6F0;border-radius:8px;padding:10px;font-family:Arial;font-size:12px;min-height:70px;direction:rtl;background:#F8F9FC" placeholder="اكتب هنا..."></textarea></div>'
    +'</div>'
    +'<button id="ep-submit" onclick="epSubmit()" style="display:none;width:calc(100% - 28px);margin:4px 14px;background:linear-gradient(135deg,#1B2A4A,#2C4270);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;font-family:Arial">✅ إرسال التقييم</button>'
    +'</div>';

  document.body.innerHTML = pageHtml;

  // Auto-load questions if type already selected
  if(type && TYPE_Q[type]) setTimeout(buildQCards, 100);

function renderMediaLists(){

    const items = arr.map((v,i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--g2)">
        <span style="flex:1;font-size:12.5px">${v}</span>
        <button class="btn btn-d btn-sm" onclick="delMediaListItem('${key}',${i})">🗑 حذف</button>
      </div>`).join('');
    return `
      <div class="sc">
        <div class="sctitle" style="color:${clr}">${title}</div>
        <div>${items.length ? items : '<div style="color:#aaa;font-size:12px;text-align:center;padding:10px">لا توجد عناصر</div>'}</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input class="finp" id="ml-${key}" placeholder="أضف نوع نشاط جديد..." style="flex:1">
          <button class="btn btn-p btn-sm" onclick="addMediaListItem('${key}')">➕ إضافة</button>
        </div>
      </div>`;
  }
  return `
    <div style="max-width:620px;margin:0 auto">
      <div class="sec-title">⚙️ إدارة أنواع الأنشطة الإعلامية</div>
      <p style="font-size:12px;color:var(--g3);margin-bottom:14px">يمكنك إضافة أنواع أنشطة جديدة أو حذف الموجودة. التغييرات تنعكس فوراً على نماذج الإدخال.</p>
      ${listSection('📡 أنواع الأنشطة الإعلامية', db.mediaTypes, 'mediaTypes', '#1B2A4A')}
    </div>`;
}
function addMediaListItem(key){
  const inp = document.getElementById('ml-'+key);
  const val = inp ? inp.value.trim() : '';
  if(!val){ toast('يرجى إدخال قيمة','err'); return; }
  if(db[key].indexOf(val) > -1){ toast('العنصر موجود مسبقاً','err'); return; }
  db[key].push(val);
  save();
  toast('تمت الإضافة ✅','ok');
  go('medialists');
}
function delMediaListItem(key, i){
  if(!confirm('هل تريد حذف هذا النوع؟')) return;
  db[key].splice(i,1);
  save();
  toast('تم الحذف','ok');
  go('medialists');
}

var _statsChart1 = null, _statsChart2 = null, _mediaChart1 = null;

function renderStatsCharts(){
  var R = db.requests;
  var COLORS = ['#1B2A4A','#1A4A7A','#1E6B3C','#C45E0A','#C9A84C','#C0392B','#8A8680','#6B4FA0'];
  var STAT_COLORS = {'مكتملة':'#1E6B3C','قيد التنفيذ':'#1A4A7A','انتظار':'#C45E0A','ملغاة':'#C0392B','مؤجلة':'#8A8680'};

  // By type
  var typeLabels = [], typeData = [];
  db.reqTypes.forEach(function(t){
    var n = 0;
    R.forEach(function(r){
      if(r.reqType){ r.reqType.split('/').forEach(function(x){ if(x.trim()===t) n++; }); }
    });
    typeLabels.push(t); typeData.push(n);
  });

  // By status
  var statLabels = db.statuses;
  var statData = db.statuses.map(function(s){ return R.filter(function(r){return r.status===s;}).length; });
  var statColors = db.statuses.map(function(s){ return STAT_COLORS[s]||'#8A8680'; });

  var c1 = document.getElementById('statsChart1');
  var c2 = document.getElementById('statsChart2');
  if(!c1 || !c2 || typeof Chart === 'undefined') return;

  if(_statsChart1) _statsChart1.destroy();
  if(_statsChart2) _statsChart2.destroy();

  // 2-D Column Chart (vertical bar)
  _statsChart1 = new Chart(c1, {
    type: 'bar',
    data: { labels: typeLabels, datasets: [{
      label: 'عدد الطلبات', data: typeData,
      backgroundColor: typeLabels.map(function(_,i){ return COLORS[i%COLORS.length]; }),
      borderColor: typeLabels.map(function(_,i){ return COLORS[i%COLORS.length]; }),
      borderWidth: 1, borderRadius: 3
    }]},
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        title: { display: false }
      },
      scales: {
        x: { ticks: { font: {size:10}, maxRotation: 45 }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { stepSize: 1, font: {size:11} }, grid: { color: '#E0E6F0' } }
      }
    }
  });

  // 2-D Pie Chart
  _statsChart2 = new Chart(c2, {
    type: 'pie',
    data: { labels: statLabels, datasets: [{
      data: statData,
      backgroundColor: statColors,
      borderColor: '#fff',
      borderWidth: 2
    }]},
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: 'right', labels: { font: {size:11}, padding: 12, usePointStyle: true } },
        tooltip: {
          callbacks: {
            label: function(ctx){
              var total = ctx.dataset.data.reduce(function(a,b){return a+b;},0);
              var pct = total ? Math.round(ctx.parsed/total*100) : 0;
              return ' ' + ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
            }
          }
        }
      }
    }
  });
}

function openPeriodModal(type){
  var now = new Date();
  var curYear = now.getFullYear();
  var curMonth = now.getMonth();
  var curQ = Math.floor(curMonth/3);

  // Get available years from data
  var years = [];
  db.requests.forEach(function(r){
    var d = r.submitDate ? new Date(r.submitDate).getFullYear() : null;
    if(d && years.indexOf(d)===-1) years.push(d);
  });
  years.sort(function(a,b){return b-a;});
  if(years.indexOf(curYear)===-1) years.unshift(curYear);

  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var QUARTERS=['الربع الأول (يناير – مارس)','الربع الثاني (أبريل – يونيو)','الربع الثالث (يوليو – سبتمبر)','الربع الرابع (أكتوبر – ديسمبر)'];
  var typeNames = {month:'شهري', quarter:'ربع سنوي', year:'سنوي'};

  var yearOpts = years.map(function(y){
    return '<option value="'+y+'"'+(y===curYear?' selected':'')+'>'+y+'</option>';
  }).join('');

  var selector = '';
  if(type==='month'){
    var monthOpts = MONTHS.map(function(m,i){
      return '<option value="'+i+'"'+(i===curMonth?' selected':'')+'>'+m+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الشهر</label><select class="fsel2" id="ps-month">'+monthOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="ps-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else if(type==='quarter'){
    var qOpts = QUARTERS.map(function(q,i){
      return '<option value="'+i+'"'+(i===curQ?' selected':'')+'>'+q+'</option>';
    }).join('');
    selector = '<div class="fgrid" style="grid-template-columns:1fr 1fr;gap:12px">'
      +'<div><label class="flbl">الربع السنوي</label><select class="fsel2" id="ps-quarter">'+qOpts+'</select></div>'
      +'<div><label class="flbl">السنة</label><select class="fsel2" id="ps-year">'+yearOpts+'</select></div>'
      +'</div>';
  } else {
    selector = '<div><label class="flbl">السنة</label>'
      +'<select class="fsel2" id="ps-year" style="max-width:200px">'+yearOpts+'</select></div>';
  }

  showModal('<div class="mhdr"><span class="mhdr-title">🖨 تقرير التثقيف – '+typeNames[type]+'</span>'
    +'<button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="mbody">'
    +'<p style="font-size:12px;color:var(--g3);margin-bottom:16px">اختر الفترة الزمنية للتقرير:</p>'
    +selector
    +'</div>'
    +'<div class="mfoot">'
    +'<button class="btn btn-s" onclick="closeModal()">إلغاء</button>'
    +'<button class="btn btn-p" id="ps-confirm" onclick="confirmPeriod(document.getElementById(\'ps-type\').value)">🖨 طباعة</button>'+'<input type="hidden" id="ps-type" value="'+type+'">'
    +'</div>');
}

function confirmPeriod(type){
  var yr  = parseInt(document.getElementById('ps-year')?.value  || new Date().getFullYear());
  var mo  = parseInt(document.getElementById('ps-month')?.value  ?? new Date().getMonth());
  var q   = parseInt(document.getElementById('ps-quarter')?.value ?? Math.floor(new Date().getMonth()/3));
  closeModal();
  printReportCustom(type, yr, mo, q);
}

function printReportCustom(type, yr, mo, q){
  var now = new Date();
  var MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var QUARTERS=['الربع الأول','الربع الثاني','الربع الثالث','الربع الرابع'];
  var filtered=db.requests, title='';

  if(type==='month'){
    filtered=db.requests.filter(function(r){
      if(!r.submitDate) return false;
      var d=new Date(r.submitDate);
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    title='التقرير الشهري – '+MONTHS[mo]+' '+yr;
  } else if(type==='quarter'){
    filtered=db.requests.filter(function(r){
      if(!r.submitDate) return false;
      var d=new Date(r.submitDate);
      return d.getFullYear()===yr && Math.floor(d.getMonth()/3)===q;
    });
    title='التقرير الربع سنوي – '+QUARTERS[q]+' '+yr;
  } else {
    filtered=db.requests.filter(function(r){
      return r.submitDate && new Date(r.submitDate).getFullYear()===yr;
    });
    title='التقرير السنوي – '+yr;
  }

  if(filtered.length===0){
    alert('لا توجد طلبات للفترة المحددة: '+title);
    return;
  }

  // نفس تنسيق printReport
  var typeMap={};
  db.reqTypes.forEach(function(t){ typeMap[t]=0; });
  filtered.forEach(function(r){
    if(r.reqType) r.reqType.split('/').forEach(function(t){
      t=t.trim(); if(typeMap[t]===undefined) typeMap[t]=0; typeMap[t]++;
    });
  });
  var typeRows='', typeTotal=0;
  Object.entries(typeMap).forEach(function(e,i){
    typeTotal+=e[1];
    typeRows+='<tr><td>'+(i+1)+'</td><td style="text-align:right;font-weight:600">'+e[0]+'</td>'
      +'<td style="font-size:16px;font-weight:900;color:#1B2A4A">'+e[1]+'</td></tr>';

  typeRows+='<tr style="background:#1B2A4A;color:#fff;font-weight:700">'
    +'<td colspan="2" style="text-align:right;padding:9px;color:#FFFFFF">المجموع الكلي</td>'
    +'<td style="font-size:18px;color:#FFFFFF">'+typeTotal+'</td></tr>';

  var statMap={};
  db.statuses.forEach(function(s){ statMap[s]=0; });
  filtered.forEach(function(r){ var s=r.status||'غير محدد'; if(statMap[s]===undefined) statMap[s]=0; statMap[s]++; });
  var statRows='', statTotal=0;
  Object.entries(statMap).forEach(function(e,i){
    statTotal+=e[1];
    statRows+='<tr><td>'+(i+1)+'</td><td style="text-align:right;font-weight:600">'+e[0]+'</td>'
      +'<td style="font-size:16px;font-weight:900;color:#1B2A4A">'+e[1]+'</td></tr>';
  });
  statRows+='<tr style="background:#1B2A4A;color:#fff;font-weight:700">'
    +'<td colspan="2" style="text-align:right;padding:9px;color:#FFFFFF">المجموع الكلي</td>'
    +'<td style="font-size:18px;color:#FFFFFF">'+statTotal+'</td></tr>';

  var done=filtered.filter(function(r){return r.status==='مكتملة';}).length;
  var prog=filtered.filter(function(r){return r.status==='قيد التنفيذ';}).length;
  var wait=filtered.filter(function(r){return r.status==='انتظار';}).length;
  var pct=filtered.length?Math.round(done/filtered.length*100):0;

    +'body{font-family:Calibri,Arial,sans-serif;padding:24px;direction:rtl;color:#1A1816;background:#fff}'

    +'.meta{font-size:11px;color:#555;margin-bottom:14px;border-bottom:3px solid #1B2A4A;padding-bottom:8px}'
    +'.kbox{display:inline-block;background:#EEF1F7;border-right:4px solid #1B2A4A;padding:10px 16px;margin:0 4px 14px;border-radius:6px;text-align:center;min-width:88px}'
    +'.knum{font-size:22px;font-weight:900;color:#1B2A4A}.klbl{font-size:10px;color:#888}'
    +'.sec{font-size:13px;font-weight:700;color:#1B2A4A;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #1B2A4A}'
    +'.cols{display:flex;gap:16px}.cols>div{flex:1}'
    +'table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px}'
    +'thead th{background:#1B2A4A;color:#fff;padding:9px 10px;text-align:center;font-weight:700;border-bottom:2px solid #C9A84C}'
    +'td{padding:8px 10px;border:1px solid #ddd;text-align:center;color:#1A1816}'
    +'tr:nth-child(even){background:#F4F6FB}'
    +'.footer{margin-top:18px;font-size:10px;color:#999;text-align:center;border-top:1px solid #ddd;padding-top:8px}'
    +'</style>';

  var w=window.open('','_blank');

    +'<h2>نظام ادارة طلبات المدارس - قسم التثقيف الوقائي</h2>'
    +'<div class="meta">'+title+' | تاريخ الطباعة: '+now.toLocaleDateString('ar-QA')+'</div>'
    +'<div style="margin-bottom:8px">'
    +'<div class="kbox"><div class="knum">'+filtered.length+'</div><div class="klbl">اجمالي الطلبات</div></div>'

function copyEvalUrl(){
  var urlEl = document.getElementById('eval-url-display');
  if(!urlEl) return;
  var url = urlEl.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){ toast('تم نسخ الرابط ✅','ok'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('تم نسخ الرابط ✅','ok');
  }
}

      var avg = e.answers ? (Object.values(e.answers).reduce(function(s,v){return s+v;},0)/Object.values(e.answers).length).toFixed(1) : '—';
      var stars = '';
      for(var s=1;s<=5;s++) stars += s<=Math.round(avg)?'★':'☆';
      rows += '<tr>'
        +'<td style="font-weight:700;color:#1B2A4A">'+(db.evaluations.length-i)+'</td>'
        +'<td style="text-align:right;font-weight:600">'+e.trainerName+'</td>'
        +'<td style="text-align:right">'+e.schoolName+'</td>'
        +'<td>'+e.date+'</td>'
        +'<td style="color:#C9A84C;font-size:16px">'+stars+'</td>'
        +'<td style="font-weight:700;color:#1B2A4A">'+avg+' / 5</td>'
        +'<td class="no-print"><div style="display:flex;gap:5px;justify-content:center">'

    });

    rows = '<tr><td colspan="7" class="t-empty">لا توجد تقييمات بعد</td></tr>';
  }

  return `
  <div class="krow" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi blue"><div class="kpi-lbl">إجمالي التقييمات</div><div class="kpi-val blue">${db.evaluations.length}</div></div>
    <div class="kpi gold"><div class="kpi-lbl">متوسط التقييم العام</div><div class="kpi-val gold">${db.evaluations.length?((db.evaluations.reduce(function(s,e){return s+(e.answers?Object.values(e.answers).reduce(function(a,v){return a+v;},0)/Object.values(e.answers).length:0);},0)/db.evaluations.length).toFixed(1)+' / 5'):'—'}</div></div>
    <div class="kpi green"><div class="kpi-lbl">عدد المدربين المقيَّمين</div><div class="kpi-val green">${[...new Set(db.evaluations.map(function(e){return e.trainerName;}))].length}</div></div>
  </div>
  <div class="sec-title">⭐ سجل التقييمات</div>
  <div class="card">
    <div class="card-toolbar no-print">
      <button class="btn btn-p" onclick="printEvalQR()">🖨 طباعة بطاقات الباركود</button>
      <button class="btn btn-s no-print" onclick="window.print()">🖨 طباعة النتائج</button>
      <button class="btn btn-p" style="background:#1E6B3C" onclick="showImportEvalModal()">📥 استيراد من إيميل</button>
    </div>
    <table>
      <thead><tr><th>#</th><th>المدرب</th><th>المدرسة</th><th>التاريخ</th><th>التقييم</th><th>المتوسط</th><th class="no-print">إجراءات</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function viewEval(id){
  var e = db.evaluations.find(function(x){return x.id===id;});
  if(!e) return;
  var rows = EVAL_QUESTIONS.map(function(q){
    var val = e.answers ? (e.answers[q.id]||0) : 0;
    var stars = '';
    for(var s=1;s<=5;s++) stars += s<=val?'★':'☆';
    return '<tr><td style="text-align:right;padding:8px">'+q.text+'</td>'
      +'<td style="color:#C9A84C;font-size:18px;padding:8px">'+stars+'</td>'

function delEval(id){
  if(!confirm('هل تريد حذف هذا التقييم؟')) return;
  db.evaluations = db.evaluations.filter(function(e){return e.id!==id;});
  save(); toast('تم الحذف','ok'); go('evals');
